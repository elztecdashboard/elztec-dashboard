<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elztec — Financieel Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
  :root {
    --bg:        #f5f6fa;
    --surface:   #ffffff;
    --surface2:  #f0f1f7;
    --border:    #e2e4f0;
    --ink:       #1a1b2e;
    --muted:     #8a8ca8;
    --purple:    #5b5fef;
    --purple-l:  #7c7ff5;
    --purple-bg: rgba(91,95,239,0.08);
    --green:     #0ea472;
    --green-bg:  rgba(14,164,114,0.08);
    --red:       #e83a5a;
    --red-bg:    rgba(232,58,90,0.08);
    --blue:      #0e7fc2;
    --blue-bg:   rgba(14,127,194,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:"Inter",sans-serif; min-height:100vh; }

  body::before {
    content:""; position:fixed; inset:0;
    background-image: linear-gradient(rgba(91,95,239,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(91,95,239,0.04) 1px, transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }

  .wrapper { position:relative; z-index:1; max-width:1160px; margin:0 auto; padding:36px 24px 60px; }

  /* Header */
  header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:40px; padding-bottom:24px; border-bottom:2px solid var(--border);
    flex-wrap:wrap; gap:16px;
    background:var(--surface); border-radius:16px; padding:24px 28px;
    box-shadow:0 2px 12px rgba(91,95,239,0.07);
    border:1px solid var(--border);
  }
  .logo-area { display:flex; align-items:center; gap:16px; }
  .logo-img { height:42px; width:auto; }
  .logo-divider { width:1px; height:36px; background:var(--border); }
  .logo-text { display:flex; flex-direction:column; gap:3px; }
  .logo-title { font-size:15px; font-weight:700; color:var(--ink); }
  .logo-sub { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  .header-tags { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .tag { font-family:"JetBrains Mono",monospace; font-size:10px; padding:5px 12px; border-radius:20px; letter-spacing:0.5px; text-transform:uppercase; font-weight:600; }
  .tag-purple { background:var(--purple-bg); color:var(--purple); border:1px solid rgba(91,95,239,0.2); }
  .tag-muted  { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

  .section-label { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; margin-top:28px; }

  /* KPI */
  .kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .kpi {
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:22px 20px 18px; position:relative; overflow:hidden;
    transition:border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation:fadeUp 0.5s ease both;
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
  }
  .kpi:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(91,95,239,0.12); border-color:var(--purple); }
  .kpi:nth-child(1){animation-delay:.05s} .kpi:nth-child(2){animation-delay:.1s} .kpi:nth-child(3){animation-delay:.15s}
  .kpi::after { content:""; position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0; }
  .kpi.omzet::after  { background:linear-gradient(90deg, var(--blue), #60c5f7); }
  .kpi.kosten::after { background:linear-gradient(90deg, var(--red), #f97090); }
  .kpi.result::after { background:linear-gradient(90deg, var(--purple), var(--purple-l)); }

  .kpi-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; margin-bottom:14px; }
  .kpi.omzet  .kpi-icon { background:var(--blue-bg); }
  .kpi.kosten .kpi-icon { background:var(--red-bg); }
  .kpi.result .kpi-icon { background:var(--purple-bg); }
  .kpi-label { font-size:12px; font-weight:600; color:var(--muted); margin-bottom:14px; text-transform:uppercase; letter-spacing:0.5px; }
  .kpi-months { display:flex; gap:16px; margin-bottom:14px; }
  .kpi-month { flex:1; }
  .kpi-month-name { font-family:"JetBrains Mono",monospace; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:5px; }
  .kpi-val { font-size:21px; font-weight:800; letter-spacing:-0.5px; line-height:1; }
  .kpi.omzet  .kpi-val { color:var(--blue); }
  .kpi.kosten .kpi-val { color:var(--red); }
  .kpi.result .kpi-val { color:var(--purple); }
  .kpi-divider { height:1px; background:var(--border); margin-bottom:12px; }
  .kpi-ytd { display:flex; justify-content:space-between; align-items:center; }
  .kpi-ytd-label { font-family:"JetBrains Mono",monospace; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .kpi-ytd-val { font-size:14px; font-weight:700; }
  .kpi.omzet  .kpi-ytd-val { color:var(--blue); }
  .kpi.kosten .kpi-ytd-val { color:var(--red); }
  .kpi.result .kpi-ytd-val { color:var(--purple); }

  /* Charts */
  .charts-row { display:grid; grid-template-columns:1.6fr 1fr; gap:16px; margin-top:24px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; animation:fadeUp 0.5s ease both; animation-delay:.2s; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:8px; flex-wrap:wrap; }
  .card-title { font-size:13px; font-weight:700; color:var(--ink); }
  .card-tag { font-family:"JetBrains Mono",monospace; font-size:9px; padding:3px 9px; border-radius:20px; background:var(--surface2); color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; border:1px solid var(--border); }

  .marge-list { display:flex; flex-direction:column; gap:18px; }
  .marge-item { display:flex; flex-direction:column; gap:6px; }
  .marge-top  { display:flex; justify-content:space-between; align-items:baseline; }
  .marge-name { font-size:13px; font-weight:600; color:var(--ink); }
  .marge-pct  { font-family:"JetBrains Mono",monospace; font-size:12px; font-weight:700; }
  .marge-track { height:7px; background:var(--surface2); border-radius:4px; overflow:hidden; border:1px solid var(--border); }
  .marge-fill  { height:100%; border-radius:4px; transition:width 1.2s cubic-bezier(0.16,1,0.3,1); }
  .marge-sub   { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--muted); }
  .marge-sep   { height:1px; background:var(--border); }

  .breakdown-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; margin-top:24px; animation:fadeUp 0.5s ease both; animation-delay:.25s; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .tabs { display:flex; gap:4px; background:var(--surface2); padding:4px; border-radius:10px; width:fit-content; border:1px solid var(--border); }
  .tab { padding:6px 18px; font-size:12px; font-weight:600; border-radius:7px; cursor:pointer; border:none; background:transparent; color:var(--muted); transition:all 0.15s; font-family:"Inter",sans-serif; }
  .tab.active { background:var(--purple); color:#fff; box-shadow:0 2px 8px rgba(91,95,239,0.35); }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { font-family:"JetBrains Mono",monospace; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:8px 10px; text-align:right; border-bottom:2px solid var(--border); font-weight:600; }
  thead th:first-child { text-align:left; }
  tbody tr { transition:background 0.1s; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:10px 10px; border-bottom:1px solid var(--border); text-align:right; color:var(--ink); }
  tbody td:first-child { text-align:left; font-weight:500; }
  tbody tr:last-child td { border-bottom:none; }
  .cat-header td { padding:10px 10px 6px !important; font-size:10px !important; font-weight:700 !important; color:var(--purple) !important; background:var(--purple-bg) !important; letter-spacing:1.5px; text-transform:uppercase; border-bottom:none !important; }
  tr.subtotal td { font-weight:700; background:var(--surface2); }
  tr.subtotal td:first-child { color:var(--ink); }
  tr.total-row td { font-size:14px !important; font-weight:800 !important; background:var(--purple-bg) !important; border-top:2px solid rgba(91,95,239,0.2) !important; color:var(--purple) !important; }

  .num-blue   { color:var(--blue)   !important; font-weight:600; }
  .num-red    { color:var(--red)    !important; font-weight:600; }
  .num-green  { color:var(--green)  !important; font-weight:600; }
  .num-purple { color:var(--purple) !important; font-weight:700; }

  .footer-note { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--purple); border-radius:10px; padding:14px 20px; font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--muted); margin-top:24px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .footer-note strong { color:var(--purple); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @media(max-width:720px){ .kpi-row{grid-template-columns:1fr} .charts-row{grid-template-columns:1fr} .kpi-val{font-size:18px} }
</style>
</head>
