name: Genereer Financieel Dashboard

on:
  push:
    paths:
      - 'data/financieel.xlsx'   # Trigger alleen als het Excel bestand wordt bijgewerkt
  workflow_dispatch:              # Handmatig starten via GitHub interface

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installeer Python dependencies
        run: pip install pandas openpyxl

      - name: Genereer dashboard
        run: python generate_dashboard.py data/financieel.xlsx data/logo.png

      - name: Commit en push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard bijgewerkt op $(date +'%d-%m-%Y')"
          git push
